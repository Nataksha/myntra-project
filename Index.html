<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button
      class="bag"
      onclick="
        cartquantity = cartquantity + 1;
        document.querySelector('#cart').innerText =
          `Your bag has ${cartquantity} items`;
      "
    >
      Add To Bag
    </button>
    <button
      id="wish"
      onclick="
        cartquantity = cartquantity - 1;
        document.querySelector('#cart').innerText =
          `Your bag has ${cartquantity} items`;
      "
    >
      ❤️Move To Wishlist
    </button>
    <button
      class="bag"
      onclick="
        cartquantity = cartquantity + 2;
        document.querySelector('#cart').innerText =
          `Your bag has ${cartquantity} items`;
      "
    >
      Add 1+1 Sale Item</button
    ><br />
    <h1 id="cart"></h1>
    <script>
      let cartquantity = 0;
      document.querySelector("#cart").innerText =
        `Your bag has ${cartquantity} items`;
      document.querySelector("#bag");
    </script>
  </body>
</html>
